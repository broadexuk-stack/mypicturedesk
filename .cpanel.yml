---
# Repo: https://github.com/broadexuk-stack/mypicturedesk
# Each task runs in its own shell, so variables don't persist between lines.
# All paths are hardcoded for reliability.

deployment:
  tasks:
    # Ensure writable directories exist
    - /bin/mkdir -p /home/gqsoav7aer3y/public_html/party/quarantine/thumbs
    - /bin/mkdir -p /home/gqsoav7aer3y/public_html/party/gallery/thumbs
    - /bin/mkdir -p /home/gqsoav7aer3y/public_html/party/data

    # Copy files from the repo to the webroot, skipping config.php so live
    # credentials are never overwritten by a git pull.
    - /usr/bin/rsync -rlp --exclude='config.php' party/ /home/gqsoav7aer3y/public_html/party/

    # Set standard permissions on everything
    - /bin/find /home/gqsoav7aer3y/public_html/party -type d -exec chmod 755 {} \;
    - /bin/find /home/gqsoav7aer3y/public_html/party -type f -exec chmod 644 {} \;

    # Ensure writable dirs stay writable after the find/chmod pass
    - /bin/chmod 755 /home/gqsoav7aer3y/public_html/party/quarantine
    - /bin/chmod 755 /home/gqsoav7aer3y/public_html/party/quarantine/thumbs
    - /bin/chmod 755 /home/gqsoav7aer3y/public_html/party/gallery
    - /bin/chmod 755 /home/gqsoav7aer3y/public_html/party/gallery/thumbs
    - /bin/chmod 755 /home/gqsoav7aer3y/public_html/party/data
